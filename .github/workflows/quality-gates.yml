name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Format check (non-blocking baseline)
        continue-on-error: true
        run: npm run format:check

      - name: Validate songs (pack-level)
        run: npm run validate-songs

      - name: Validate catalog (regression baseline)
        run: npm run validate-catalog

      - name: Build
        run: npm run build

      - name: Dependency security audit
        run: npm audit --omit=dev --audit-level=moderate

      - name: YouTube official link audit (optional)
        if: ${{ secrets.YOUTUBE_API_KEY != '' }}
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/audit-official-youtube-links.js --strict --limit=500
